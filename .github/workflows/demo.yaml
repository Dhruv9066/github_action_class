name: demo_workflow 
on: [push] 
jobs: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6 
    
      - name: command 
        run: echo "Hello, World! from 1st job"

      - name: Installing cowsay command
        run: sudo apt install cowsay -y 

      - name: Generating dog image 
        run: cowsay -f dog "run for cover, I am a dog..." >> dog.txt
      
      - name: dispalying the dog 
        run: cat ./dog.txt