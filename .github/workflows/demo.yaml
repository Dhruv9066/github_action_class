name: demo_workflow

on:
  workflow_dispatch:
    inputs:
      dhruv_env:
        description: "Select the environment to deploy"
        required: true
        type: environment
      
jobs:
  demo_job2:
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.event.inputs.dhruv_env}} 

    steps:
      - name: Get ready my pizza
        run: |
          echo "Here is your pizza ${{ vars.NAME }}"
