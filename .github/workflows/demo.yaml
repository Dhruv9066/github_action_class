name: demo_workflow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select the environment to deploy"
        required: true
        type: environment

jobs:
  demo_job2:
    runs-on: ubuntu-latest

    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Get ready my pizza
        run: |
          echo "Here is your pizza ${{ vars.NAME }}"
