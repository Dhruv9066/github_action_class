name: demo_workflow

on: [push]

jobs:
  demo_job1:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Command
        run: echo "Hello, World! from 1st job"

      - name: Install cowsay
        run: sudo apt update && sudo apt install cowsay -y

      - name: Generate dog image
        run: cowsay -f dog "Run for cover, I am a dog..." > dog.txt

      - name: Display the dog
        run: cat dog.txt