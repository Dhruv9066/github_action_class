name: demo_workflow #Name of the workflow
on: [push] # On which event this workflow will run
jobs: # Define the jobs that will run in this workflow
  demo_job1: #Name of the job
    runs-on: ubuntu-latest #Define where this job will run 
    steps:
      - name: Checkout repository # Name of the step
        uses: actions/checkout@v6 # Use the checkout action to checkout the repository
    
      - name: command # Name of the step
        run: echo "Hello, World! from 1st job" # Run a command to print "Hello, World! from 1st job" to the console

  demo_job2: # Name of the job
